# CCAS prod reverse proxy — single ingress for backend (/api/*) and frontend (/)
#
# Design notes:
#   - 此 nginx 為 prod compose（docker/docker-compose.yml）唯一對 host 暴露的 service。
#     backend / frontend / redis 一律不對 host 開 port，所有外部請求由本 proxy 收斂。
#   - 標準 reverse proxy headers 全套設定（Host / X-Forwarded-* / X-Real-IP / Upgrade /
#     Connection $connection_upgrade）為 D9.1 要求，確保 cookie session、真實 client IP、
#     未來 SSE / WebSocket 預留通道皆正確運作。
#   - listen 8080 對應 frontend 的非 root nginx 慣例；docker compose 透過 ${CCAS_PORT}
#     映射到 host port。

pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths writable by non-root appuser (UID 1001)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # WebSocket / SSE upgrade map (Connection header)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    sendfile on;
    keepalive_timeout 65;

    # Docker embedded DNS — defer upstream resolution to request time
    # （避免使用 upstream block 在 nginx -t 階段就嘗試解析 backend / frontend hostname）
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;
        server_name _;

        # Liveness probe (proxy healthcheck only — does not proxy to upstream)
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok";
        }

        # API reverse proxy → backend service (must come before /)
        location /api/ {
            # 使用 variable 強制 nginx 在 request 時 resolve hostname（避免 startup 即綁 IP）
            set $backend_upstream "http://backend:8000";
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_pass_header  Set-Cookie;
            proxy_buffering    off;
            proxy_read_timeout 60s;
        }

        # Frontend SPA → frontend nginx service
        location / {
            set $frontend_upstream "http://frontend:8080";
            proxy_pass         $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_pass_header  Set-Cookie;
            proxy_read_timeout 60s;
        }
    }
}
