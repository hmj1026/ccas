# CCAS prod reverse proxy — single ingress for backend (/api/*) and frontend (/)
#
# Design notes:
#   - 此 nginx 為 prod compose（docker/docker-compose.yml）唯一對 host 暴露的 service。
#     backend / frontend / redis 一律不對 host 開 port，所有外部請求由本 proxy 收斂。
#   - 標準 reverse proxy headers 全套設定（Host / X-Forwarded-* / X-Real-IP / Upgrade /
#     Connection $connection_upgrade）為 D9.1 要求，確保 cookie session、真實 client IP、
#     未來 SSE / WebSocket 預留通道皆正確運作。
#   - listen 8080 對應 frontend 的非 root nginx 慣例；docker compose 透過 ${CCAS_PORT}
#     映射到 host port。

pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths writable by non-root appuser (UID 1001)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # WebSocket / SSE upgrade map (Connection header)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 登入端點限流：每 IP 5 req/min（burst 3）；僅計入 POST（登入提交）。
    # GET session 狀態查詢使用空 key（nginx 不計入限流），避免 SPA 正常
    # polling 被誤擋；其他 API 呼叫不經此 zone
    map $request_method $login_limit_key {
        default "";
        POST    $binary_remote_addr;
    }
    # Note: nginx skips rate accounting entirely when the zone key is empty,
    # so non-POST requests mapped to "" above are never throttled.
    limit_req_zone $login_limit_key zone=login:10m rate=5r/m;
    limit_req_status 429;

    # 條件式 HSTS：僅在 nginx 自身終結 TLS（$scheme = https）時送出。
    # 不採 $http_x_forwarded_proto——該 header 可被直連攻擊者偽造，
    # 在純 HTTP 部署誤發 HSTS 會造成合法使用者長期斷線（DoS）。
    # 若由 Cloudflare Tunnel / Traefik / Caddy 終結 TLS，請改在該層設定 HSTS。
    map $scheme $hsts_header {
        default "";
        https   "max-age=31536000; includeSubDomains";
    }

    sendfile on;
    keepalive_timeout 65;

    # 上傳大小上限：唯一的檔案上傳端點為 credentials.json（遠小於 1 MB），
    # 限制 request body 以避免大檔濫用；backend 端另有同值的應用層檢查
    client_max_body_size 1m;

    # Docker embedded DNS — defer upstream resolution to request time
    # （避免使用 upstream block 在 nginx -t 階段就嘗試解析 backend / frontend hostname）
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;
        server_name _;

        # HSTS（見上方 map；$hsts_header 為空時 nginx 不送出此 header）
        add_header Strict-Transport-Security $hsts_header always;

        # Liveness probe (proxy healthcheck only — does not proxy to upstream)
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok";
        }

        # 登入端點（exact match）：套用 login 限流，其餘 proxy 行為與 /api/ 相同
        location = /api/auth/session {
            limit_req zone=login burst=3 nodelay;

            set $backend_upstream "http://backend:8000";
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_pass_header  Set-Cookie;
            proxy_buffering    off;
            proxy_read_timeout 60s;
        }

        # API reverse proxy → backend service (must come before /)
        location /api/ {
            # 使用 variable 強制 nginx 在 request 時 resolve hostname（避免 startup 即綁 IP）
            set $backend_upstream "http://backend:8000";
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_pass_header  Set-Cookie;
            proxy_buffering    off;
            proxy_read_timeout 60s;
        }

        # Frontend SPA → frontend nginx service
        location / {
            set $frontend_upstream "http://frontend:8080";
            proxy_pass         $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_pass_header  Set-Cookie;
            proxy_read_timeout 60s;
        }
    }
}
