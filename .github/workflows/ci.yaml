name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ --cov --cov-report=term-missing --cov-fail-under=70

  backend-integration-test:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CJK fonts
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends fonts-wqy-zenhei

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run integration tests
        run: uv run pytest tests/integration/ --timeout=120

  scripts-checks:
    name: Scripts & Env Sync Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: docker/example.env ⊆ .env.example sync
        run: ./scripts/check-env-sync.sh

      - name: backend/docker-image SSOT sync
        run: ./scripts/sync-docker-image-assets.sh --check

      - name: docker-entrypoint.sh unit tests
        run: ./tests/scripts/test_entrypoint.sh

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build (includes TypeScript check)
        run: pnpm run build

      - name: Test
        run: pnpm run test
