name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      # Unit-only coverage gate. The floor (70) is governed by pyproject.toml's
      # [tool.coverage.report] fail_under (SSOT); this flag is kept equal to it
      # so the three runners (CI unit, pre-push, pyproject) never drift.
      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ --cov --cov-report=term-missing --cov-fail-under=70

  backend-integration-test:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CJK fonts
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends fonts-wqy-zenhei

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      # Integration-layer router coverage floor. Explicit --cov=src/ccas/api/routers
      # targets the API router package directly (the unit-only omit list in
      # pyproject excludes 5 routers from the *unit* gate; here they are the very
      # thing under test). Measured router coverage ~70%; floor pinned at 50 with
      # headroom so a small regression doesn't redden CI.
      - name: Run integration tests
        run: >-
          uv run pytest tests/integration/ --timeout=120
          --cov=src/ccas/api/routers --cov-report=term-missing --cov-fail-under=50

      # E2E full-pipeline state-machine tests (ingest→decrypt→parse→notify).
      # Run as a separate step (no coverage gate) so the integration router
      # coverage measurement above is not diluted by e2e runs. Shares this
      # job's uv sync + CJK fonts; Gmail/Telegram are mocked in e2e conftest.
      - name: Run e2e tests
        run: uv run pytest tests/e2e/ -v --timeout=120

      - name: docker-entrypoint.sh unit tests
        working-directory: ${{ github.workspace }}
        run: ./tests/scripts/test_entrypoint.sh

  scripts-checks:
    name: Scripts & Env Sync Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: docker/example.env ⊆ .env.example sync
        run: ./scripts/check-env-sync.sh

      - name: CSP nginx.conf == api/app.py sync
        run: ./scripts/check-csp-sync.sh

      - name: backend/docker-image SSOT sync
        run: ./scripts/sync-docker-image-assets.sh --check

      - name: check-env.sh unit tests
        run: ./tests/scripts/test_check_env.sh

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build (includes TypeScript check)
        run: pnpm run build

      - name: Test (with coverage gate)
        run: pnpm run test --coverage --coverage.reporter=text-summary

  frontend-e2e:
    name: Frontend E2E (Playwright, mock specs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      # mock-route 規格透過 page.route 攔截後端，毋需真實 API；需後端的
      # auth/pages 規格在 E2E_BACKEND 未設時自我 skip（見 playwright.config.ts）。
      - name: Run E2E (mock specs; webServer auto-starts)
        run: pnpm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
