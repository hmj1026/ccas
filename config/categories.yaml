# 消費分類關鍵字對照（SSOT）
#
# 用法：`ccas.tools.categories --apply` 會把這份清單同步到 `categories` 資料表。
# 比對策略：交易商家名稱 `LIKE '%keyword%'` 即視為命中該分類。
# 管理原則：
#   - 新增／調整分類 → 改這個檔案然後重跑 `--apply`
#   - 使用者在 API 直接新增的自訂 row（不在本 YAML 中）不會被 seed 流程刪除
#   - keyword 應避免泛詞（「食」「店」等），盡量以品牌／商家全名為主
#
# Schema：
#   categories:
#     - category: <類別名稱>
#       keywords:
#         - <關鍵字>

