services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ccas-data:/data
    env_file:
      - ./.env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ccas-redis:/data

volumes:
  ccas-data:
  ccas-redis:
