x-shared-env: &shared-env
  DATABASE_URL: "sqlite+aiosqlite:////data/ccas.db"
  STAGING_DIR: "/data/staging"
  GMAIL_CREDENTIALS_PATH: "/data/credentials.json"
  GMAIL_TOKEN_PATH: "/data/token.json"
  REDIS_URL: redis://redis:6379/0

services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ccas-data:/data
      - ./scripts:/scripts:ro
      - ./.env.example:/app/.env.example:ro
    env_file:
      - ./.env
    environment:
      <<: *shared-env
    entrypoint: ["/scripts/docker-entrypoint.sh"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      target: production
    volumes:
      - ccas-data:/data
    env_file:
      - ./.env
    environment:
      <<: *shared-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ccas.scheduler"]

  bot:
    build:
      context: ./backend
      target: production
    volumes:
      - ccas-data:/data
    env_file:
      - ./.env
    environment:
      <<: *shared-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ccas.bot"]

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ccas-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  ccas-data:
  ccas-redis:
