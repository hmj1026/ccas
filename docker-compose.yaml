services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "8000:8000"
    volumes:
      - ccas-data:/data
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      target: production
    volumes:
      - ccas-data:/data
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ccas.scheduler"]

  bot:
    build:
      context: ./backend
      target: production
    volumes:
      - ccas-data:/data
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ccas.bot"]

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    env_file:
      - ./.env

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ccas-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  ccas-data:
  ccas-redis:
