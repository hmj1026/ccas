x-shared-env: &shared-env
  DATABASE_URL: "sqlite+aiosqlite:////data/ccas.db"
  STAGING_DIR: "/data/staging"
  GMAIL_CREDENTIALS_PATH: "/data/credentials.json"
  GMAIL_TOKEN_PATH: "/data/token.json"
  REDIS_URL: redis://redis:6379/0
  LOG_DIR: "/logs"

services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/data:/data
      - ./scripts:/scripts:ro
      - ./backend/scripts:/app/scripts:ro
      - ./.env.example:/app/.env.example:ro
      - ./logs:/logs
    env_file:
      - ./.env
    environment:
      <<: *shared-env
      LOG_FILE_PREFIX: "ccas-backend"
    entrypoint: ["/scripts/docker-entrypoint.sh"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend/data:/data
      - ./logs:/logs
    env_file:
      - ./.env
    environment:
      <<: *shared-env
      LOG_FILE_PREFIX: "ccas-worker"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "rq", "worker", "--url", "redis://redis:6379/0"]
    healthcheck:
      disable: true

  scheduler:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend/data:/data
      - ./logs:/logs
    env_file:
      - ./.env
    environment:
      <<: *shared-env
      SCHEDULER_API_BASE_URL: "http://backend:8000"
      LOG_FILE_PREFIX: "ccas-scheduler"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ccas.scheduler"]
    healthcheck:
      disable: true

  bot:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend/data:/data
      - ./logs:/logs
    env_file:
      - ./.env
    environment:
      <<: *shared-env
      LOG_FILE_PREFIX: "ccas-bot"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ccas.bot"]
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173', r => r.statusCode < 400 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ccas-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Dev Tools (opt-in: docker compose --profile dev-tools up) ---

  sqlite-web:
    profiles: [dev-tools]
    image: coleifer/sqlite-web@sha256:1e5b86237968ed747554f951c6df2fc2fe4bf4ef070b8ca23d553d7f6c6426f7
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ./backend/data:/data:ro
    depends_on:
      backend:
        condition: service_healthy
    command: ["sqlite_web", "/data/ccas.db", "--host", "0.0.0.0", "--port", "8080", "--read-only"]
    restart: "no"

  redis-commander:
    profiles: [dev-tools]
    image: rediscommander/redis-commander@sha256:19cd0c49f418779fa2822a0496c5e6516d0c792effc39ed20089e6268477e40a
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

volumes:
  ccas-redis:
